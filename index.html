      // Prevent cross-origin Script error noise from reporting to platform frame observers
      window.onerror = function (message, url, line, col, error) {
        if (message === "Script error." || (message && message.toString().toLowerCase().includes("script error"))) {
          console.warn("[FUTURA SHIELD] Incidente de canal de script externo suprimido de forma segura.");
          return true; // Suppress default browser error bubbling
        }
        return false;
      };
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason && (event.reason.message || String(event.reason));
        if (reason === "Script error." || (reason && reason.toString().toLowerCase().includes("script error"))) {
          event.preventDefault();
          event.stopPropagation();
          console.warn("[FUTURA SHIELD] Reincidencia de promesa externa suprimida de forma segura.");
        }
      });
    </script>
